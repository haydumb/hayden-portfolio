server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Astro builds clean-URL directories (e.g. /work/index.html); resolve them.
  location / {
    try_files $uri $uri/ $uri/index.html =404;
  }

  location = /404.html {
    internal;
  }
  error_page 404 /404.html;
}
